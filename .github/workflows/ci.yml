name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: cinerec
          POSTGRES_PASSWORD: cinerec
          POSTGRES_DB: cinerec
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cinerec"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CINEREC_EMBEDDER: hash
      CINEREC_DATABASE_URL: postgresql+psycopg://cinerec:cinerec@localhost:5432/cinerec_test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Test (pytest)
        run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Build
        run: npm run build
